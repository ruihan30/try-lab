# =============================================================================
#  docker-compose.yml
#  One command to build and run all 3 containers:
#    docker-compose up --build
# =============================================================================
#
# CONTAINER NETWORK:
#   Docker Compose puts all services in a private bridge network called
#   `sse_net`. Inside this network, each service is reachable by its
#   service name as the hostname (e.g. http://backend:8000).
#
# PORTS:
#   Only the ports mapped under `ports:` are accessible from your HOST machine.
#   Internal service-to-service calls (logger → backend) stay inside Docker.
#
#   Host machine access:
#     React UI   →  http://localhost:3000
#     FastAPI    →  http://localhost:8000  (also http://localhost:8000/docs for Swagger)
#
# HOW TO RUN:
#   Build + start all:   docker-compose up --build
#   Stop all:            docker-compose down
#   Rebuild one service: docker-compose up --build backend
#   View logs:           docker-compose logs -f
#   View one service:    docker-compose logs -f logger

# version: "3.9"

services:

  # ── 1. FastAPI Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sse_backend
    ports:
      - "8000:8000"       # Expose to host so you can curl/swagger directly
    networks:
      - sse_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/status')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── 2. Logger ───────────────────────────────────────────────────────────
  logger:
    build:
      context: ./logger
      dockerfile: Dockerfile
    container_name: sse_logger
    environment:
      # Connects to 'backend' by Docker's internal DNS hostname
      BACKEND_URL: "http://backend:8000"
      # Tweak this to change how fast events are generated (seconds)
      INTERVAL_SECONDS: "1.0"
    networks:
      - sse_net
    depends_on:
      backend:
        condition: service_healthy  # Wait until backend passes its healthcheck
    restart: unless-stopped

  # ── 3. React Frontend (built + served by Nginx) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass the backend URL as a build arg so Vite bakes it into the JS bundle.
        # The browser connects to the backend via the HOST machine (localhost:8000),
        # NOT via the internal Docker network.
        VITE_BACKEND_URL: "http://localhost:8000"
    container_name: sse_frontend
    ports:
      - "3000:80"         # React UI → http://localhost:3000
    networks:
      - sse_net
    depends_on:
      - backend
    restart: unless-stopped

# ── Shared private network ──────────────────────────────────────────────────
networks:
  sse_net:
    driver: bridge
