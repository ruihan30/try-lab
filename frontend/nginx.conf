server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Serve React app (SPA fallback) ─────────────────────────────────────
    # Any URL that doesn't match a real file falls back to index.html
    # so React Router can handle client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy /api/* → FastAPI backend ─────────────────────────────────────
    # The React app calls /api/stream, /api/status, etc.
    # Nginx strips /api and forwards to the backend container.
    #
    # WHY THIS MATTERS FOR SSE:
    #   SSE is a long-lived HTTP connection. Nginx by default will buffer
    #   the response body and only flush when the buffer is full — which
    #   would delay/break your SSE stream. The settings below DISABLE
    #   buffering so events are forwarded to the browser immediately.
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;

        # Required headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # ── SSE-critical settings ───────────────────────────────────────────
        # Disable ALL proxy buffering — events must flow through immediately
        proxy_buffering    off;
        proxy_cache        off;

        # Keep the connection alive (SSE needs this)
        proxy_set_header   Connection        '';

        # Prevent Nginx from closing the connection after 60s of no data
        # (SSE pings from the server reset this timer)
        proxy_read_timeout 86400s;  # 24 hours
        proxy_send_timeout 86400s;

        # Tell the browser not to cache the SSE stream
        add_header         Cache-Control     'no-cache';
        add_header         X-Accel-Buffering 'no';
    }

    # Gzip for static assets (NOT for SSE — that's proxied above)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
